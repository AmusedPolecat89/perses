<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0e1729" />
    <meta name="description" content="OBSESC observability node" />
    <title>OBSESC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      .loading {
        display: flex;
        height: 100vh;
        width: 100vw;
        align-items: center;
        justify-content: center;
        padding: 0;
        background-color: #0e1729;
        color: #f7f6f2;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 32px;
        font-weight: 600;
        letter-spacing: 0.4em;
        animation: obsesc-pulse 1.6s ease-in-out infinite;
      }

      .light-theme {
        color-scheme: light;
        background-color: #f7f6f2;
        color: #0e1729;
      }

      @keyframes obsesc-pulse {
        0%, 100% { opacity: 0.55; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div id="loader" class="loading">[&nbsp;&nbsp;]</div>
      <script>
        // Default to dark; only flip to the light-themed loader when the
        // operator has explicitly chosen light mode in a prior session.
        const stored = localStorage.getItem('PERSES_ENABLE_DARK_MODE');
        if (stored === 'false') {
          document.getElementById('loader').classList.add('light-theme');
        }
      </script>
    </div>
  </body>
</html>
